<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Directed Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  svg { border: 1px solid #ccc; }
  .node circle { stroke: #000; stroke-width: 1.5px; }
  .link { stroke: #999; stroke-width: 2px; marker-end: url(#arrow); }
  .tooltip { position: absolute; background: #fff; border: 1px solid #ccc; padding: 5px; pointer-events: none; }
</style>
</head>
<body>

<div id="graph"></div>
<div id="tooltip" class="tooltip" style="display:none;"></div>

<script>
const width = 800, height = 600;

const svg = d3.select("#graph")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

// Arrow marker
svg.append('defs').append('marker')
  .attr('id','arrow')
  .attr('viewBox','0 -5 10 10')
  .attr('refX',15)
  .attr('refY',0)
  .attr('markerWidth',6)
  .attr('markerHeight',6)
  .attr('orient','auto')
  .append('path')
  .attr('d','M0,-5L10,0L0,5')
  .attr('fill','#999');

const tooltip = d3.select("#tooltip");

let graphData = {
  nodes: [
    {id: "A", info: "Start node"},
    {id: "B", info: "Intermediate"},
    {id: "C", info: "End node"}
  ],
  links: [
    {source: "A", target: "B", info: "A to B"},
    {source: "B", target: "C", info: "B to C"}
  ]
};

const simulation = d3.forceSimulation()
  .force("link", d3.forceLink().id(d => d.id).distance(150))
  .force("charge", d3.forceManyBody().strength(-400))
  .force("center", d3.forceCenter(width/2, height/2));

function renderGraph(data) {
  svg.selectAll("*").remove();

  // Redefine arrow marker
  svg.append('defs').append('marker')
    .attr('id','arrow')
    .attr('viewBox','0 -5 10 10')
    .attr('refX',15)
    .attr('refY',0)
    .attr('markerWidth',6)
    .attr('markerHeight',6)
    .attr('orient','auto')
    .append('path')
    .attr('d','M0,-5L10,0L0,5')
    .attr('fill','#999');

  const link = svg.append("g")
      .attr("class","links")
    .selectAll("line")
    .data(data.links)
    .enter()
    .append("line")
      .attr("class","link")
      .on("click", (event,d) => showTooltip(event,d));

  const node = svg.append("g")
      .attr("class","nodes")
    .selectAll("g")
    .data(data.nodes)
    .enter()
    .append("g")
      .attr("class","node")
      .on("click", (event,d) => showTooltip(event,d));

  node.append("circle")
      .attr("r", 20)
      .attr("fill", "lightblue");

  node.append("text")
      .attr("text-anchor", "middle")
      .attr("dy", 5)
      .text(d => d.id);

  simulation.nodes(data.nodes).on("tick", ticked);
  simulation.force("link").links(data.links);
  simulation.alpha(1).restart();

  function ticked() {
    link
      .attr("x1", d => d.source.x)
      .attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x)
      .attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  }
}

function showTooltip(event, d) {
  tooltip.style("display","block")
    .style("left", (event.pageX + 5) + "px")
    .style("top", (event.pageY + 5) + "px")
    .html(JSON.stringify(d, null, 2));
}

// Example function to update colors dynamically
function updateColors(updates) {
  svg.selectAll(".node circle")
    .attr("fill", d => updates.nodes?.[d.id] || "lightblue");
  svg.selectAll(".link")
    .attr("stroke", d => updates.links?.[d.source.id + "-" + d.target.id] || "#999");
}

renderGraph(graphData);

// Example update
setTimeout(() => {
  updateColors({
    nodes: { A: "orange", C: "green" },
    links: { "A-B": "red" }
  });
}, 2000);

</script>
</body>
</html>
